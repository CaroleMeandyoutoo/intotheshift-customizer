<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Bibliothèque — Into The Shift</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/asap@5/index.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="header"></div>
<script src="header.js"></script>
<script src="catalogue.js"></script>
<script src="app.js"></script>

<div class="subnav">
  <button class="sn on">Bibliothèque</button>
  <button class="sn" onclick="window.location.href='questions.html'">Création</button>
  <button class="sn" onclick="window.location.href='parametrage.html'">Paramétrage</button>
  <button class="sn" onclick="window.location.href='campagne.html'">Campagne</button>
  <button class="sn" onclick="window.location.href='validation.html'">Transmission</button>
</div>

<div class="page-wrap">
  <h1 class="page-title">Choisir une base d’autodiagnostic</h1>
  <p class="page-sub">Sélectionnez une base de travail, personnalisez les situations et préparez votre campagne. Into The Shift finalisera ensuite le lien de votre autodiag à diffuser auprès de vos collaborateurs et le dashboard des résultats.</p>

  <div id="themeFilters" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px"></div>
  <div class="grid" id="catalogueGrid"></div>
</div>

<div class="modal-overlay" id="previewModal">
  <div class="modal-panel" style="background:#fff">
    <button class="close-x" onclick="closePreview()">Fermer l’aperçu</button>
    <div style="padding:28px" id="previewContent"></div>
  </div>
</div>

<script>
let currentTheme = "all";

function renderFilters(){
  const el = document.getElementById("themeFilters");
  el.innerHTML = `<button class="btn ${currentTheme==='all'?'btn-primary':'btn-secondary'}" onclick="setTheme('all')">Tous les thèmes</button>` +
    ITS_THEMES.map(t => `<button class="btn ${currentTheme===t.key?'btn-primary':'btn-secondary'}" onclick="setTheme('${t.key}')">${t.icon} ${t.label}</button>`).join("");
}

function setTheme(key){
  currentTheme = key;
  renderFilters();
  renderCatalogue();
}

function renderCatalogue(){
  const grid = document.getElementById("catalogueGrid");
  const ads = ITS_CATALOGUE.filter(ad => currentTheme === "all" || ad.themeKey === currentTheme);
  grid.innerHTML = ads.map(ad => `
    <div class="ad-card card">
      <div class="audience">${ad.theme} · ${ad.audience}</div>
      <div class="ad-title">${ad.title}</div>
      <div class="ad-desc">${ad.description}</div>
      ${(ad.tags||[]).map(t=>`<span class="tag ${t.includes('Factory')?'tbf':''}">${t}</span>`).join("")}
      <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
        <button class="btn btn-secondary" onclick="openPreview('${ad.id}')">Aperçu</button>
        <button class="btn btn-primary" onclick="useAd('${ad.id}')">Utiliser comme base de travail</button>
      </div>
    </div>
  `).join("");
}

function openPreview(id){
  const ad = itsGetAdById(id);
  const el = document.getElementById("previewContent");
  el.innerHTML = `
    <div class="audience">${ad.theme}</div>
    <h2 style="font-size:24px;margin:8px 0">${ad.title}</h2>
    <p style="color:#64748b;line-height:1.6;margin-bottom:18px">${ad.description}</p>
    <div>${(ad.tags||[]).map(t=>`<span class="tag ${t.includes('Factory')?'tbf':''}">${t}</span>`).join("")}</div>
    <h3 style="margin:24px 0 12px">Chapitres</h3>
    ${ad.chapters.map((c,i)=>`
      <div class="card" style="margin-bottom:10px">
        <div class="audience">Chapitre ${i+1}</div>
        <div class="ad-title">${c.title}</div>
        <div class="ad-desc">${c.description}</div>
      </div>
    `).join("")}
    <button class="btn btn-primary" onclick="useAd('${ad.id}')">Utiliser comme base de travail</button>
  `;
  document.getElementById("previewModal").style.display = "flex";
}

function closePreview(){
  document.getElementById("previewModal").style.display = "none";
}

function useAd(id){
  itsStartFromCatalogue(id);
  window.location.href = "questions.html";
}

renderFilters();
renderCatalogue();
</script>
</body>
</html>
