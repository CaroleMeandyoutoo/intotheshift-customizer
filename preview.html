p',sans-serif}.chap-name-inp:focus{border-bottom-color:#18375d}.chap-desc-inp{font-size:12px;color:#64748b;border:none;outline:none;border-bottom:1px solid transparent;background:transparent;width:100%;margin-top:5px;font-family:'Asap',sans-serif}.chap-desc-inp:focus{border-bottom-color:#d8e0ea}.chap-actions{display:flex;gap:7px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}.btn{border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Asap',sans-serif;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;text-decoration:none}.btn-primary{background:#18375d;color:#fff;border:none}.btn-primary:hover{background:#122a47}.btn-ai{background:linear-gradient(90deg,#18375d,#007883);color:#fff;border:none}.btn-secondary{background:#fff;color:#007883;border:1px solid #b8dfe0}.btn-outline{background:#fff;color:#18375d;border:1px solid #c5cfdc}.btn-danger{background:#fff;color:#eb6366;border:1px solid #f5c0c1}.q-counter{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.qc-text{font-size:12px;color:#64748b}.qc-text strong{color:#18375d}.qc-bar{height:5px;background:#edf1f7;border-radius:3px;overflow:hidden;width:90px}.qc-fill{height:100%;border-radius:3px;background:#007883;transition:width .3s}.likert-info{background:#f0f8ff;border:1px solid #b8dfe0;border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px}.likert-info-body{font-size:11px;color:#18375d;line-height:1.5}.q-list{display:flex;flex-direction:column;gap:8px}.q-card{border:1px solid #d8e0ea;border-radius:12px;overflow:hidden;background:#fff;transition:border-color .12s}.q-card:hover{border-color:#b8c4d4}.q-card.open{border-color:#18375d}.q-header{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}.q-num{width:24px;height:24px;border-radius:50%;background:#edf1f7;color:#18375d;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.q-card.open .q-num{background:#18375d;color:#fff}.q-main{flex:1;min-width:0}.q-text{font-size:13px;font-weight:700;color:#18375d;line-height:1.4;margin-bottom:7px}.editable{outline:none;border-radius:6px;padding:2px 4px;margin-left:-4px;min-height:18px;cursor:text}.editable:focus{background:#edf1f7;box-shadow:0 0 0 1px #d8e0ea inset}.q-tags-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center}.tag-prov{display:inline-flex;align-items:center;gap:4px;background:#f0edff;border:1px solid #c4b5fd;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;color:#6d28d9;white-space:nowrap}.tag-prov.tbf{background:#fef3c7;border-color:#fcd34d;color:#92400e}.tag-pill{display:inline-flex;align-items:center;gap:3px;background:#edf1f7;border:1px solid #c5cfdc;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;color:#18375d}.tag-pill.ai-sug{background:#e5f4f5;border-color:#b8dfe0;color:#007883}.q-right{display:flex;align-items:center;gap:4px;flex-shrink:0;margin-top:1px}.qa-btn{width:30px;height:30px;border-radius:8px;border:1px solid #e8edf4;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}.qa-btn:hover{background:#f7f9fc;border-color:#c5cfdc}.qa-btn.del:hover{background:#fceaea;border-color:#f5c0c1}.q-body{display:none;padding:10px 14px 14px 48px;border-top:1px solid #f0f4f8}.q-card.open .q-body{display:block}.type-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-bottom:10px;display:inline-block;background:#edf1f7;color:#18375d}.answers{display:flex;flex-direction:column;gap:6px}.answer-row{display:flex;align-items:center;gap:8px;background:#fafbfc;border:1px solid #e8edf4;border-radius:8px;padding:8px 12px}.answer-dot{width:7px;height:7px;border-radius:50%;background:#c5ccd5;flex-shrink:0}.answer-inp{flex:1;font-size:12px;border:none;outline:none;background:transparent;font-family:'Asap',sans-serif;color:#18375d}.score-pill{display:flex;align-items:center;gap:4px;background:#edf1f7;border:1px solid #c5cfdc;border-radius:20px;padding:4px 10px;flex-shrink:0}.score-pill span{font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase}.score-inp{width:44px;border:none;background:transparent;color:#18375d;font-weight:700;text-align:center;outline:none}.q-tools{display:flex;justify-content:space-between;gap:8px;margin-top:10px;flex-wrap:wrap}.profils-view{display:none}.profils-view.on{display:block}.seuils-card{background:#fafbfc;border:1px solid #e2e8f0;border-radius:10px;padding:16px 18px;margin-bottom:20px}.seuils-title{font-size:13px;font-weight:700;color:#18375d;margin-bottom:10px}.profils-grid{display:flex;flex-direction:column;gap:16px}.profil-card{border-radius:12px;overflow:hidden;border:1px solid #e2e8f0;background:#fff}.profil-card.p0{border-color:#ffd6d3}.profil-card.p1{border-color:#f8e1a5}.profil-card.p2{border-color:#b9e7d0}.profil-header{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fafbfc;border-bottom:1px solid #e8edf4}.profil-card.p0 .profil-header{background:#fff1f0;border-bottom-color:#ffd6d3}.profil-card.p1 .profil-header{background:#fff8e8;border-bottom-color:#f8e1a5}.profil-card.p2 .profil-header{background:#eefaf4;border-bottom-color:#b9e7d0}.profil-level{display:flex;align-items:center;gap:9px}.profil-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}.profil-level-name{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}.profil-score-range{font-size:12px;font-weight:800;color:#64748b;margin-left:auto}.profil-body{padding:18px;background:#fff;display:flex;flex-direction:column;gap:14px}.pfield label{display:block;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}.pfield input,.pfield textarea{width:100%;padding:9px 12px;border:1px solid #d8e0ea;border-radius:8px;font-size:13px;color:#18375d;font-family:'Asap',sans-serif;outline:none}.pfield textarea{min-height:90px;line-height:1.55;resize:vertical}.panel-overlay{position:fixed;inset:0;background:rgba(15,30,55,.35);z-index:40;display:none}.panel-overlay.on{display:block}.panel-right{position:fixed;top:0;right:-420px;width:400px;height:100%;background:#fff;border-left:1px solid #d8e0ea;z-index:50;transition:right .25s ease;display:flex;flex-direction:column}.panel-right.on{right:0}.panel-head{padding:15px 18px;border-bottom:1px solid #e8edf4;display:flex;align-items:center;justify-content:space-between}.panel-title{font-size:14px;font-weight:700;color:#18375d}.panel-close{width:28px;height:28px;border-radius:7px;border:1px solid #e8edf4;background:#fff;cursor:pointer}.panel-body{padding:14px;overflow:auto;display:flex;flex-direction:column;gap:10px}.panel-card{background:#fafbfc;border:1px solid #e8edf4;border-radius:10px;padding:12px}.panel-card-title{font-size:13px;font-weight:700;color:#18375d;line-height:1.4;margin-bottom:8px}.footer-actions{position:fixed;left:230px;right:0;bottom:0;background:rgba(255,255,255,.92);border-top:1px solid #e8edf4;backdrop-filter:blur(8px);padding:10px 28px;z-index:30}.footer-inner{display:flex;align-items:center;justify-content:space-between;gap:10px}.validation-msg{font-size:11px;color:#eb6366;font-weight:700}.ok-msg{font-size:11px;color:#007883;font-weight:700}.empty-q{text-align:center;padding:40px;color:#94a3b8;font-size:13px;border:1.5px dashed #e2e8f0;border-radius:10px}

<body>
<div class="shell">
  <div id="header"></div><script src="header.js"></script>
  <div class="timeline-wrap">
    <div class="timeline">
      <button class="tl-step done" onclick="window.location.href='index-bibliotheque.html'"><span class="tl-num">✓</span><span>Choisir</span></button>
      <span class="tl-line"></span>
      <button class="tl-step active"><span class="tl-num">2</span><span>Créer</span></button>
      <span class="tl-line"></span>
      <button class="tl-step" onclick="goParam(true)"><span class="tl-num">3</span><span>Paramétrage</span></button>
      <span class="tl-line"></span>
      <button class="tl-step" onclick="goParam(true)"><span class="tl-num">4</span><span>Campagne</span></button>
      <span class="tl-line"></span>
      <button class="tl-step" onclick="goParam(true)"><span class="tl-num">5</span><span>Transmettre</span></button>
    </div>
  </div>
  <div class="breadcrumb">
    <span class="bc-link" onclick="window.location.href='index-bibliotheque.html'">Bibliothèque</span><span class="bc-sep">›</span><span class="bc-cur" id="bc-cur">Création de l’autodiagnostic</span>
  </div>
  <div class="editor-layout">
    <aside class="sidebar">
      <div class="sb-title">Chapitres</div>
      <div id="chap-nav"></div>
      <div class="sb-bot">
        <div class="sb-total" id="sb-total"></div>
        <div class="btn-save-hint" id="btn-save-hint"></div>
        <button class="btn-save" id="btn-save" onclick="goParam(false)">Continuer vers le paramétrage</button>
      </div>
    </aside>
    <main class="main-editor" id="main-editor"></main>
  </div>
</div>
<div class="panel-overlay" id="overlay" onclick="closePanel()"></div>
<aside class="panel-right" id="panel"><div class="panel-head"><span class="panel-title" id="panel-title">Générer avec IA</span><button class="panel-close" onclick="closePanel()">✕</button></div><div class="panel-body" id="panel-body"></div></aside>
<script src="intotheshift-data.js"></script>
<script>
const KEY='intotheshift_customizer_state_v3';
const $=s=>document.querySelector(s); const $$=s=>Array.from(document.querySelectorAll(s));
const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const clone=o=>JSON.parse(JSON.stringify(o)); const uid=()=>`q_${Math.random().toString(36).slice(2,9)}`;
let activeChapter=0, view='questions', openQ=null;
function library(){return window.INTOTHESHIFT_LIBRARY||{themes:[]}}
function firstAd(){const t=library().themes[0];return {t,a:t.autodiags[0]}}
function buildState(){const {t,a}=firstAd();return{themeId:t.id,adId:a.id,title:a.title,clientName:'',referent:'',language:'Français',launchDate:'',reminderDate:'',closeDate:'',intro:'',demographics:[],resources:[],messages:{},notes:'',chapters:a.chapters.map(c=>({id:c.id,title:c.title,goal:c.goal,situations:c.situations.filter(q=>q.defaultSelected).slice(0,6).map(normQ),bank:c.situations.filter(q=>!q.defaultSelected).map(normQ),profiles:normProfiles(c.profiles||[])}))}}
function normQ(q){return{id:q.id||uid(),type:q.type||'choix',text:q.text||'',tags:q.tags||['Base assistée par IA'],answers:(q.answers||[]).map(a=>({text:a.text||a.l||'',score:Number(a.score??a.s??0)})),clientComment:q.clientComment||''}}
function normProfiles(arr){const base=[{level:'En développement',min:0,max:1.49},{level:'En progression',min:1.5,max:2.49},{level:'Ancré',min:2.5,max:3}];return base.map((b,i)=>({level:b.level,min:arr[i]?.min??b.min,max:arr[i]?.max??b.max,title:arr[i]?.title||arr[i]?.titre||'',summary:arr[i]?.summary||arr[i]?.phrase||'',description:arr[i]?.description||''}))}
function getState(){try{let raw=localStorage.getItem(KEY); if(raw)return JSON.parse(raw)}catch(e){} const s=buildState(); saveState(s); return s}
function saveState(s){localStorage.setItem(KEY,JSON.stringify(s)); updateGate()}
function render(){renderNav(); renderMain(); updateGate()}
function renderNav(){const s=getState(); $('#chap-nav').innerHTML=s.chapters.map((c,i)=>{const okQ=validQuestions(c), okP=validProfiles(c); const dot=(okQ&&okP)?'':'warn'; return `<div class="cni ${i===activeChapter?'on':''}"><div class="cni-head" onclick="activeChapter=${i};render()"><span class="cni-lbl">Chapitre ${i+1}</span><span class="cni-name">${esc(c.title)}</span><div class="cni-meta"><span class="cni-dot ${dot}"></span>${c.situations.length}/10 questions</div><div class="cni-meta"><span class="cni-dot ${okP?'':'bad'}"></span>${filledProfiles(c)}/3 profils</div></div><div class="cni-tabs"><button class="cni-tab ${i===activeChapter&&view==='questions'?'on':''}" onclick="event.stopPropagation();activeChapter=${i};view='questions';render()">Questions</button><button class="cni-tab ${i===activeChapter&&view==='profils'?'on':''}" onclick="event.stopPropagation();activeChapter=${i};view='profils';render()">Profils</button></div></div>`}).join('')}
function renderMain(){const s=getState(),c=s.chapters[activeChapter]; $('#bc-cur').textContent=`${view==='questions'?'Questions':'Profils'} — ${c.title}`; if(view==='profils')return renderProfiles(c); const pct=Math.min(100,(c.situations.length/6)*100); $('#main-editor').innerHTML=`<div class="chap-head"><div class="chap-info"><div class="chap-badge">Chapitre ${activeChapter+1} · Questions</div><input class="chap-name-inp" id="chap-title" value="${esc(c.title)}"><input class="chap-desc-inp" id="chap-goal" value="${esc(c.goal)}"></div><div class="chap-actions"><button class="btn btn-ai" onclick="openPanel('regen')">↻ Régénérer avec IA</button><button class="btn btn-outline" onclick="openPanel('addai')">✧ Ajouter une question avec IA</button><button class="btn btn-secondary" onclick="openPanel('bank')">⌕ Piocher dans les bibliothèques</button><button class="btn btn-outline" onclick="addManual()">✎ Ajouter manuellement</button></div></div><div class="q-counter"><div class="qc-text"><strong>${c.situations.length}</strong> question${c.situations.length>1?'s':''} · min 4, max 10</div><div class="qc-bar"><div class="qc-fill" style="width:${pct}%"></div></div></div><div class="likert-info"><div>ℹ️</div><div class="likert-info-body"><strong>Score par chapitre</strong> — la moyenne est calculée à partir des scores des réponses. Plusieurs réponses peuvent avoir le même score si elles traduisent un niveau proche.</div></div><div class="q-list">${c.situations.length?c.situations.map((q,i)=>qCard(q,i)).join(''):'<div class="empty-q">Aucune question pour ce chapitre.</div>'}</div>`; $('#chap-title').oninput=e=>{const s=getState();s.chapters[activeChapter].title=e.target.value;saveState(s);renderNav()}; $('#chap-goal').oninput=e=>{const s=getState();s.chapters[activeChapter].goal=e.target.value;saveState(s)}; bindQuestions()}
function qCard(q,i){const open=openQ===q.id; return `<article class="q-card ${open?'open':''}" data-q="${q.id}"><div class="q-header" onclick="toggleQ('${q.id}')"><div class="q-num">${i+1}</div><div class="q-main"><div class="q-text"><span class="editable" contenteditable="true" data-qtext="${q.id}" onclick="event.stopPropagation()">${esc(q.text)}</span></div><div class="q-tags-row"><span class="tag-prov">🤖 Base assistée par IA</span>${(q.tags||[]).filter(t=>t!=='Base assistée par IA').slice(0,3).map(t=>`<span class="tag-pill">${esc(t)}</span>`).join('')}</div></div><div class="q-right"><button class="qa-btn" onclick="event.stopPropagation();openPanel('variant','${q.id}')">↻</button><button class="qa-btn del" onclick="event.stopPropagation();deleteQ('${q.id}')">🗑</button><button class="qa-btn" onclick="event.stopPropagation();toggleQ('${q.id}')">⌄</button></div></div><div class="q-body"><span class="type-badge">Réponses & scoring</span><div class="answers">${q.answers.map((a,j)=>`<div class="answer-row"><span class="answer-dot"></span><input class="answer-inp" data-ans="${q.id}|${j}" value="${esc(a.text)}"><div class="score-pill"><span>Score</span><input class="score-inp" type="number" step="0.5" min="0" max="3" data-score="${q.id}|${j}" value="${esc(a.score)}"></div><button class="qa-btn del" onclick="removeAnswer('${q.id}',${j})">×</button></div>`).join('')}</div><div class="q-tools"><button class="btn btn-outline" onclick="addAnswer('${q.id}')">+ Ajouter une réponse</button><button class="btn btn-ai" onclick="openPanel('answers','${q.id}')">Générer réponses avec IA</button></div></div></article>`}
function bindQuestions(){$$('[data-qtext]').forEach(e=>e.oninput=()=>{const q=findQ(e.dataset.qtext); if(q){q.text=e.textContent.trim(); persistCurrentQ(q)}}); $$('[data-ans]').forEach(e=>e.oninput=()=>{const [id,j]=e.dataset.ans.split('|');const q=findQ(id);q.answers[+j].text=e.value;persistCurrentQ(q)}); $$('[data-score]').forEach(e=>e.oninput=()=>{const [id,j]=e.dataset.score.split('|');const q=findQ(id);q.answers[+j].score=Number(e.value);persistCurrentQ(q)})}
function renderProfiles(c){$('#main-editor').innerHTML=`<div class="chap-head"><div class="chap-info"><div class="chap-badge">Chapitre ${activeChapter+1} · Profils</div><input class="chap-name-inp" id="chap-title" value="${esc(c.title)}"><input class="chap-desc-inp" id="chap-goal" value="${esc(c.goal)}"></div><div class="chap-actions"><button class="btn btn-ai" onclick="genProfiles(null)">Régénérer les profils avec IA</button></div></div><div class="seuils-card"><div class="seuils-title">Seuils des profils</div><div class="qc-text">Renseignez 3 profils complets : titre, résumé et description.</div></div><div class="profils-grid">${c.profiles.map((p,i)=>profileCard(p,i)).join('')}</div>`; $('#chap-title').oninput=e=>{const s=getState();s.chapters[activeChapter].title=e.target.value;saveState(s);renderNav()}; $('#chap-goal').oninput=e=>{const s=getState();s.chapters[activeChapter].goal=e.target.value;saveState(s)}; bindProfiles()}
function profileLabel(level,i){const clean=String(level||'').toLowerCase(); if(clean.includes('développement')||clean.includes('developpement')||clean.includes('début')||clean.includes('debut')||clean.includes('faible')||clean.includes('beginner'))return 'Profil 1 — En développement'; if(clean.includes('progress')||clean.includes('interm')||clean.includes('moyen'))return 'Profil 2 — En progression'; if(clean.includes('ancré')||clean.includes('ancre')||clean.includes('avanc')||clean.includes('bon'))return 'Profil 3 — Ancré'; return ['Profil 1 — En développement','Profil 2 — En progression','Profil 3 — Ancré'][i]||'Profil';}
function profileCard(p,i){const colors=['#eb6366','#ffc000','#007883'];return `<article class="profil-card p${i}"><div class="profil-header"><div class="profil-level"><span class="profil-dot" style="background:${colors[i]}"></span><span class="profil-level-name">${esc(profileLabel(p.level,i))}</span></div><div class="profil-score-range">Score ${p.min} — ${p.max}</div><button class="btn btn-ai" onclick="genProfiles(${i})">Régénérer avec IA</button></div><div class="profil-body"><div class="pfield"><label>Titre du profil</label><input data-ptitle="${i}" value="${esc(p.title)}"></div><div class="pfield"><label>Résumé en une phrase</label><input data-psummary="${i}" value="${esc(p.summary)}"></div><div class="pfield"><label>Description détaillée</label><textarea data-pdesc="${i}">${esc(p.description)}</textarea></div></div></article>`}
function bindProfiles(){$$('[data-ptitle]').forEach(e=>e.oninput=()=>{const s=getState();s.chapters[activeChapter].profiles[+e.dataset.ptitle].title=e.value;saveState(s);renderNav()});$$('[data-psummary]').forEach(e=>e.oninput=()=>{const s=getState();s.chapters[activeChapter].profiles[+e.dataset.psummary].summary=e.value;saveState(s);renderNav()});$$('[data-pdesc]').forEach(e=>e.oninput=()=>{const s=getState();s.chapters[activeChapter].profiles[+e.dataset.pdesc].description=e.value;saveState(s);renderNav()})}
function findQ(id){return getState().chapters[activeChapter].situations.find(q=>q.id===id)}
function persistCurrentQ(q){const s=getState();const arr=s.chapters[activeChapter].situations;const idx=arr.findIndex(x=>x.id===q.id); if(idx>-1)arr[idx]=q; saveState(s); updateGate()}
function toggleQ(id){openQ=openQ===id?null:id;renderMain()} function deleteQ(id){const s=getState();s.chapters[activeChapter].situations=s.chapters[activeChapter].situations.filter(q=>q.id!==id);saveState(s);render()} function addManual(){const s=getState(),c=s.chapters[activeChapter];c.situations.push({id:uid(),type:'choix',text:'Nouvelle situation à personnaliser…',tags:['Base assistée par IA'],answers:[{text:'Réponse 1',score:0},{text:'Réponse 2',score:1},{text:'Réponse 3',score:2}],clientComment:''});saveState(s);openQ=c.situations[c.situations.length-1].id;render()} function addAnswer(id){const s=getState();const q=s.chapters[activeChapter].situations.find(x=>x.id===id);q.answers.push({text:'Nouvelle réponse',score:1});saveState(s);renderMain()} function removeAnswer(id,j){const s=getState();const q=s.chapters[activeChapter].situations.find(x=>x.id===id);q.answers.splice(j,1);saveState(s);renderMain()}
function openPanel(type,ref){const s=getState(),c=s.chapters[activeChapter];$('#overlay').classList.add('on');$('#panel').classList.add('on');let html='',title='Générer avec IA'; if(type==='bank'||type==='addai'){title=type==='bank'?'Piocher dans les bibliothèques':'Ajouter une question avec IA'; const pool=[...(c.bank||[])]; html=pool.length?pool.slice(0,12).map(q=>`<div class="panel-card"><div class="panel-card-title">${esc(q.text)}</div><button class="btn btn-primary" onclick="addFromBank('${q.id}')">Ajouter cette question</button></div>`).join(''):'<div class="empty-q">Aucune suggestion disponible.</div>'} if(type==='regen'){title='Régénérer avec IA';html=`<div class="panel-card"><div class="panel-card-title">Remplacer les questions du chapitre par une nouvelle sélection issue de la base préparée.</div><button class="btn btn-ai" onclick="regenChapter()">Régénérer ce chapitre</button></div>`} if(type==='variant'){title='Proposer une variante';html=`<div class="panel-card"><div class="panel-card-title">Créer une variante plus concrète de cette situation.</div><button class="btn btn-ai" onclick="variantQ('${ref}')">Appliquer la variante</button></div>`} if(type==='answers'){title='Générer réponses avec IA';html=`<div class="panel-card"><div class="panel-card-title">Proposer 3 réponses nuancées et scorées.</div><button class="btn btn-ai" onclick="genAnswers('${ref}')">Remplacer les réponses</button></div>`} if(type==='profiles'||type==='oneprofile'){title='Générer les profils avec IA';html=`<div class="panel-card"><div class="panel-card-title">Créer des profils spécifiques au chapitre “${esc(c.title)}”.</div><button class="btn btn-ai" onclick="genProfiles(${type==='oneprofile'?ref:'null'})">Générer</button></div>`} $('#panel-title').textContent=title;$('#panel-body').innerHTML=html}
function closePanel(){$('#overlay').classList.remove('on');$('#panel').classList.remove('on')} function addFromBank(id){const s=getState(),c=s.chapters[activeChapter];const idx=(c.bank||[]).findIndex(q=>q.id===id); if(idx>-1){c.situations.push(c.bank.splice(idx,1)[0]); saveState(s); closePanel(); render()}} function regenChapter(){const s=getState(),c=s.chapters[activeChapter];const all=[...c.situations,...(c.bank||[])];c.situations=all.slice().sort(()=>Math.random()-.5).slice(0,6);c.bank=all.filter(q=>!c.situations.find(x=>x.id===q.id));saveState(s);closePanel();render()} function variantQ(id){const s=getState(),q=s.chapters[activeChapter].situations.find(x=>x.id===id);q.text=q.text.replace(/Que faites-vous \?/,'Quelle réaction adoptez-vous ?').replace(/Vous remarquez/,'Vous constatez');saveState(s);closePanel();renderMain()} function genAnswers(id){const s=getState(),q=s.chapters[activeChapter].situations.find(x=>x.id===id);q.answers=[{text:'Vous réagissez seul·e rapidement, sans chercher à vérifier le cadre.',score:0},{text:'Vous demandez un avis informel avant d’agir.',score:1},{text:'Vous vérifiez la règle applicable et alertez la bonne personne si nécessaire.',score:2},{text:'Vous formalisez le point pour éviter que la situation se reproduise.',score:3}];saveState(s);closePanel();renderMain()} function genProfiles(one){const s=getState(),c=s.chapters[activeChapter];const vals=[['Repères à consolider','Vos réflexes existent, mais ils restent dépendants du contexte.','Vous identifiez certaines situations, mais les critères d’action ne sont pas encore suffisamment stabilisés. L’enjeu est de transformer les bons réflexes ponctuels en pratiques régulières.'],['Pratiques en construction','Vous savez agir dans la plupart des situations courantes.','Vous disposez de repères utiles et vous les mobilisez dans les situations habituelles. Certains arbitrages plus ambigus peuvent encore nécessiter un appui ou une clarification.'],['Réflexes installés','Vos pratiques sont structurées et facilement mobilisables.','Vous savez repérer les situations sensibles, agir avec discernement et contribuer à sécuriser le collectif sans sur-réagir.']]; if(one===null){c.profiles=c.profiles.map((p,i)=>({...p,title:vals[i][0],summary:vals[i][1],description:vals[i][2]}))}else{c.profiles[one]={...c.profiles[one],title:vals[one][0],summary:vals[one][1],description:vals[one][2]}} saveState(s);closePanel();renderProfiles(c);renderNav()}
function validQuestions(c){return c.situations.length>=4 && c.situations.every(q=>q.text&&q.answers&&q.answers.length>=3&&q.answers.every(a=>a.text!==''&&a.score!==''&&!isNaN(Number(a.score))))} function filledProfiles(c){return (c.profiles||[]).filter(p=>p.title&&p.summary&&p.description).length} function validProfiles(c){return filledProfiles(c)===3} function allValid(){const s=getState();return s.chapters.every(c=>validQuestions(c)&&validProfiles(c))} function updateGate(){const s=getState();const total=s.chapters.reduce((n,c)=>n+c.situations.length,0); if($('#sb-total'))$('#sb-total').innerHTML=`<strong>${total}</strong> questions au total`; const ok=allValid(); if($('#btn-save'))$('#btn-save').disabled=!ok; if($('#btn-save-hint'))$('#btn-save-hint').textContent=ok?'Tout est complet.':'Complétez au moins 4 questions, les réponses, le scoring et 3 profils par chapitre.'}
function goParam(fromNav){if(allValid()){location.href='parametrage.html'}else{alert('Pour continuer, chaque chapitre doit contenir au moins 4 questions complètes, avec réponses scorées, et 3 profils entièrement renseignés.')}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
